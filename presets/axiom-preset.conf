# Axiom Binaural DSP - JamesDSP Preset Configuration
# Version: 3.0
# Description: Audiophile mastering-grade binaural processing preset

[General]
# Preset name displayed in JamesDSP UI
Name=Axiom Binaural DSP v3.0
Author=Axiom Audio
Description=Phase-coherent mastering-grade binaural processing with sub-bass generation, M/S spatialization, and BS2B crossfeed

[Liveprog]
# Enable the live programming engine
Enabled=true
# Path to the EEL2 script (relative to JamesDSP liveprog directory)
Script=axiom_binaural_dsp.eel
# Auto-start the script on preset load
AutoStart=true

[Equalizer]
# GraphicEQ curve - Warm signature with slight bass boost and air shelf
# Format: Frequency(Hz):Gain(dB) separated by spaces
# This curve complements the Fletcher-Munson exciter in the EEL2 script
GraphicEQ=20:0 30:0.5 40:1 50:1.5 60:2 80:1.5 100:1 150:0.5 200:0 300:0 500:-0.5 1k:0 2k:0.5 3k:1 5k:1.5 7k:2 10k:2.5 12k:3 14k:3 16k:2.5 20k:2
# Enable the equalizer
Enabled=true

[OutputLimiter]
# Final output limiter to prevent clipping after all processing
Enabled=true
# Limiter threshold (dBFS)
Threshold=-1.0
# Release time (ms)
Release=100
# Lookahead (ms) - reduces distortion on transients
Lookahead=5

[Reverb]
# Disabled - crossfeed provides sufficient spatialization
Enabled=false

[BassBoost]
# Disabled - sub-bass generation is handled by the EEL2 script
Enabled=false

[VirtualSurround]
# Disabled - BS2B crossfeed in EEL2 provides superior binaural processing
Enabled=false

[Notes]
# Usage recommendations:
# - For Trance/EDM: Increase Sub Harmonics Gain to 6-9dB, Side Width to 150-180%
# - For Audiophile listening: Keep defaults, reduce Crossfeed to 40-50% for more separation
# - For Late Night listening: Reduce Sub Gain to 0-3dB, increase Fletcher-Munson to 60-80%
# - The GraphicEQ curve is calibrated for neutral headphones (Sennheiser HD600 reference)
# - Adjust Liveprog sliders in real-time for fine-tuning per track/album
